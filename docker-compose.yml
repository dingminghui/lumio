services:
  postgres:
    image: postgres:16-alpine
    container_name: lumio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumio
      POSTGRES_USER: lumio
      POSTGRES_PASSWORD: lumio
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - lumio-postgres-data:/var/lib/postgresql/data

volumes:
  lumio-postgres-data:
